name: yourpelvic-healing
region: nyc

services:
  - name: web
    source_dir: /
    github:
      repo: peacefulgeek/yourpelvic-healing
      branch: main
      deploy_on_push: true
    build_command: pnpm install --frozen-lockfile && pnpm build
    run_command: node server/index.mjs
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    http_port: 3000
    health_check:
      http_path: /api/articles?limit=1
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: SITE_URL
        value: https://yourpelvichealing.com
      - key: OPENAI_API_KEY
        type: SECRET
        value: sk-82bdad0a1fd34987b73030504ae67080
      - key: OPENAI_BASE_URL
        value: https://api.deepseek.com
      - key: OPENAI_MODEL
        value: deepseek-v4-pro
      - key: AUTO_GEN_ENABLED
        value: "true"
      - key: BUNNY_STORAGE_ZONE
        value: pelvic-healing
      - key: BUNNY_API_KEY
        type: SECRET
        value: YOUR_BUNNY_API_KEY
      - key: BUNNY_CDN_URL
        value: https://pelvic-healing.b-cdn.net
      - key: AMAZON_TAG
        value: spankyspinola-20

domains:
  - domain: yourpelvichealing.com
    type: PRIMARY
  - domain: www.yourpelvichealing.com
    type: ALIAS

# No database — file-based JSON store only (§ site spec: keep it simple)
