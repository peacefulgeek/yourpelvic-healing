name: the-pelvic-floor
region: nyc

services:
  - name: web
    source_dir: /
    github:
      repo: YOUR_GITHUB_ORG/the-pelvic-floor
      branch: main
      deploy_on_push: true
    build_command: pnpm install --frozen-lockfile && pnpm build
    run_command: node server/index.mjs
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    http_port: 3000
    health_check:
      http_path: /api/articles?limit=1
      initial_delay_seconds: 30
      period_seconds: 30
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: SITE_URL
        value: https://thepelvicfloor.com
      - key: OPENAI_API_KEY
        type: SECRET
        value: YOUR_OPENAI_API_KEY
      - key: BUNNY_STORAGE_ZONE
        type: SECRET
        value: YOUR_BUNNY_STORAGE_ZONE
      - key: BUNNY_API_KEY
        type: SECRET
        value: YOUR_BUNNY_API_KEY
      - key: BUNNY_CDN_URL
        value: https://YOUR_BUNNY_CDN_URL
      - key: DATABASE_URL
        type: SECRET
        value: YOUR_DATABASE_URL

# Optional: Add a managed PostgreSQL database
# databases:
#   - name: pelvic-floor-db
#     engine: PG
#     version: "15"
#     size: db-s-dev-database
#     num_nodes: 1
